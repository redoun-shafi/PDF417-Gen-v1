<!DOCTYPE html>
<html>
<head>
<title>PDF417 Generator</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/pdf417-generator/dist/pdf417.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

<h1>PDF417 Generator</h1>

<button onclick="setMode('upload')">Upload</button>
<button onclick="setMode('manual')">Manual</button>

<div id="uploadSection">
<input type="file" id="fileInput">
<button onclick="handleFile()">Generate</button>
</div>

<div id="manualSection" style="display:none;">
<textarea id="manualText"></textarea>
<button onclick="handleManual()">Generate</button>
</div>

<div id="controls" style="display:none;">
<button onclick="downloadAll()">Download All</button>
</div>

<div id="output"></div>

<script src="app.js"></script>
</body>
</html>
